          : `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--ink-3)" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M3 20a9 9 0 0 1 18 0"/><circle cx="12" cy="8" r="4"/></svg>`}
      </div>
      <input type="file" id="fPhoto" accept="image/*" style="display:none">
    </div>

    <div class="field"><label>Имя</label><input id="fName" value="${c.name}" maxlength="50" placeholder="Как зовут?"></div>
    <div class="field">
      <label>Роль</label>
      <div class="role-grid" id="roleGrid">
        ${Object.entries(ROLES).map(([k,lbl]) => `<div class="role-opt ${c.role===k?'selected':''}" data-role="${k}">${lbl}</div>`).join('')}
      </div>
    </div>
    <div class="field"><label>Статус (своими словами)</label><input id="fStatus" value="${c.statusLabel||''}" maxlength="60" placeholder="Моя девушка, старый друг..."></div>
    <div class="field"><label>🎂 Дата рождения</label><input type="date" id="fBirthdate" value="${c.birthdate||''}"></div>
    <div class="field"><label>Заметка</label><textarea id="fNote" maxlength="300" placeholder="Что важно помнить об этом человеке">${c.note||''}</textarea></div>
    <div class="field"><label>📅 Важная дата</label><input type="date" id="fAnniv" value="${c.anniversary||''}"></div>
    <div class="field"><label>📅 Название даты</label><input id="fAnnivLabel" value="${c.anniversaryLabel||''}" placeholder="Знакомство, день рождения..."></div>
    <button class="btn" id="saveConn">${existing ? 'Сохранить' : 'Создать'}</button>
  `);

  // Photo upload
  document.getElementById('photoPreview').addEventListener('click', () => document.getElementById('fPhoto').click());
  document.getElementById('fPhoto').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    resizePhoto(file, data => {
      photoData = data;
      const prev = document.getElementById('photoPreview');
      prev.classList.add('has-photo');
      prev.innerHTML = `<img src="${data}" style="width:100%;height:100%;object-fit:cover;">`;
    });
  });

  document.querySelectorAll('#roleGrid .role-opt').forEach(o => o.addEventListener('click', () => {
    document.querySelectorAll('#roleGrid .role-opt').forEach(x => x.classList.remove('selected'));
    o.classList.add('selected');
    role = o.dataset.role;
  }));

  document.getElementById('saveConn').addEventListener('click', () => {
    const name = document.getElementById('fName').value.trim();
    if (!name) { toast('Введи имя'); return; }
    const note          = document.getElementById('fNote').value.trim();
    const statusLabel   = document.getElementById('fStatus').value.trim();
    const birthdate     = document.getElementById('fBirthdate').value;
    const anniversary   = document.getElementById('fAnniv').value;
    const anniversaryLabel = document.getElementById('fAnnivLabel').value.trim();
    if (existing) {
      Object.assign(existing, { name, role, note, statusLabel, birthdate, anniversary, anniversaryLabel, photo: photoData });
      toast('Сохранено ✓');
    } else {
      state.connections.unshift({ id: uid(), name, role, statusLabel, note, birthdate, anniversary, anniversaryLabel, photo: photoData, color: c.color, created: new Date().toISOString().slice(0,10) });
      toast('Связь добавлена');
    }
    saveState();
    closeModal();
    navigate(currentView);
  });
}

// ============== STATS ==============
function renderStats() {
  const total = state.connections.length;
  const totalEntries = state.entries.length;

  // Weekly activity (last 8 weeks)
  const weeks = Array(8).fill(0);
  state.entries.forEach(e => {
    const diff = Math.floor((Date.now() - new Date(e.date)) / (7*86400000));
    if (diff >= 0 && diff < 8) weeks[7-diff]++;
  });
  const maxW = Math.max(...weeks, 1);

  // Monthly heatmap (last 12 months, grouped by month)
  const monthCounts = Array(12).fill(0);
  const nowDate = new Date();
  state.entries.forEach(e => {
    const d = new Date(e.date);
    const monthsAgo = (nowDate.getFullYear() - d.getFullYear()) * 12 + (nowDate.getMonth() - d.getMonth());
    if (monthsAgo >= 0 && monthsAgo < 12) monthCounts[11 - monthsAgo]++;
  });
  const maxM = Math.max(...monthCounts, 1);

  // Top 5 by mentions
  const personCounts = {};
  state.entries.forEach(e => e.tags.forEach(t => { personCounts[t] = (personCounts[t]||0)+1; }));
  const topPeople = Object.entries(personCounts).sort((a,b)=>b[1]-a[1]).slice(0,5)
    .map(([id, cnt]) => ({ conn: state.connections.find(c=>c.id===id), cnt }))
    .filter(x => x.conn);
  const maxCnt = topPeople[0]?.cnt || 1;

  // Role donut
  const roleCounts = {};
  state.connections.forEach(c => { roleCounts[c.role] = (roleCounts[c.role]||0)+1; });
  const roleEntries = Object.entries(roleCounts).sort((a,b)=>b[1]-a[1]);
  const roleColors = ['#2fb389','#4cc9a0','#a3e4cd','#ffd7a3','#fcb1c4','#c5b8f0'];
  const safeTotal = total || 1;
  let cumul = 0;
  const donutSegs = roleEntries.map(([k,v],i) => {
    const pct = v/safeTotal, start = cumul;
    cumul += pct;
    return { k, v, pct, start, end: cumul, color: roleColors[i % roleColors.length] };
  });

  // Weekday distribution
  const weekdays = Array(7).fill(0);
  const wdLabels = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  state.entries.forEach(e => { weekdays[new Date(e.date).getDay()]++; });
  const maxWd = Math.max(...weekdays, 1);

  // Insight
  const topInsight = topPeople[0];
  const streak = calcStreak();

  const v = el(`
    <div class="view">
      <h1 style="margin-bottom: 20px;">Статистика</h1>

      ${topInsight ? `
        <div class="insight">
          <div class="insight-label">↑ Инсайт</div>
          <div class="insight-text">Чаще всего ты пишешь про <em>${topInsight.conn.name}</em> — ${topInsight.cnt} ${plural(topInsight.cnt,'раз','раза','раз')} за всё время.</div>
        </div>
      ` : ''}

      <div class="stat-grid">
        <div class="stat-tile feature">
          <div class="stat-label" style="color:var(--mint-deep);margin-bottom:10px;">Связей</div>
          <div class="stat-num" style="font-size:44px;color:var(--mint-deep);">${total}</div>
          <div class="stat-delta">${state.connections.filter(c=>c.role==='partner'||c.role==='friend').length} близких</div>
        </div>
        <div class="stat-tile"><div class="stat-num">${totalEntries}</div><div class="stat-label">заметок</div></div>
        <div class="stat-tile"><div class="stat-num">${streak || 0}</div><div class="stat-label">streak дней</div></div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Активность по неделям</div>
        <div class="chart-sub">Записей за последние 8 недель</div>
        <div class="bars" id="barsWeek">
          ${weeks.map((w,i) => `
            <div class="bar-col">
              <div class="bar" style="height:0%" data-h="${(w/maxW)*100}"></div>
              <div class="bar-label">${i===7?'сейч':'-'+(7-i)+'н'}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">По месяцам</div>
        <div class="chart-sub">Активность за год</div>
        <div class="heatmap" id="heatmap">
          ${monthCounts.map((cnt,i) => {
            const lvl = cnt === 0 ? '' : cnt <= maxM*0.25 ? 'l1' : cnt <= maxM*0.5 ? 'l2' : cnt <= maxM*0.75 ? 'l3' : 'l4';
            const monthIdx = (nowDate.getMonth() - 11 + i + 12) % 12;
            return `<div class="hm-cell ${lvl}" title="${MONTHS_SHORT[monthIdx]}: ${cnt} записей"></div>`;
          }).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:6px;">
          ${Array(12).fill(0).map((_,i) => {
            const monthIdx = (nowDate.getMonth() - 11 + i + 12) % 12;
            return `<div style="font-size:9px;color:var(--ink-4);text-align:center;flex:1;">${i%3===0?MONTHS_SHORT[monthIdx]:''}</div>`;
          }).join('')}
        </div>
      </div>

      ${topPeople.length ? `
        <div class="chart-card">
          <div class="chart-title">Топ по упоминаниям</div>
          <div class="chart-sub">Кто чаще всего в твоих записях</div>
          ${topPeople.map(({conn,cnt}) => `
            <div class="top-person-row">
              <div class="avatar ${conn.color}" style="width:32px;height:32px;font-size:12px;">${initials(conn.name)}</div>
              <div class="top-bar-wrap">
                <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                  <span style="font-size:13px;font-weight:500;">${conn.name}</span>
                  <span style="font-size:12px;color:var(--ink-3);">${cnt}</span>
                </div>
                <div class="top-bar-track"><div class="top-bar-fill" data-pct="${(cnt/maxCnt)*100}"></div></div>
              </div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <div class="chart-card">
        <div class="chart-title">По дням недели</div>
        <div class="chart-sub">Когда ты чаще всего пишешь</div>
        <div class="bars" id="barsWd">
          ${weekdays.map((w,i) => `
            <div class="bar-col">
              <div class="bar" style="height:0%;${i===0||i===6?'background:linear-gradient(180deg,var(--mint-2),var(--emerald))':''}" data-h="${(w/maxWd)*100}"></div>
              <div class="bar-label">${wdLabels[i]}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">По ролям</div>
        <div class="chart-sub">Структура твоего окружения</div>
        <div class="donut-wrap">
          <div class="donut">
            <svg viewBox="0 0 36 36" width="110" height="110" style="transform:rotate(-90deg)">
              ${donutSegs.map(s => {
                const len = s.pct*100, offset = s.start*100;
                return `<circle cx="18" cy="18" r="15.915" fill="none" stroke="${s.color}" stroke-width="4.2" stroke-dasharray="${len} ${100-len}" stroke-dashoffset="${-offset}"/>`;
              }).join('')}
            </svg>
            <div class="donut-center"><div><div class="num">${total}</div><div class="lbl">людей</div></div></div>
          </div>
          <div class="donut-legend">
            ${donutSegs.map(s => `
              <div class="legend-row">
                <div class="legend-swatch" style="background:${s.color}"></div>
                <span>${ROLES[s.k]||s.k}</span>
                <span class="val">${s.v}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    <div id="statsExtraBlock"></div>

    </div>
  `);

  mainEl.appendChild(v);
  requestAnimationFrame(() => {
    v.querySelectorAll('.bar').forEach((b,i) => setTimeout(() => { b.style.height = b.dataset.h+'%'; }, 50*i));
    v.querySelectorAll('.top-bar-fill').forEach((b,i) => setTimeout(() => { b.style.width = b.dataset.pct+'%'; }, 100+50*i));
    const extra = v.querySelector('#statsExtraBlock');
    if (extra) {
      const moodCard = document.createElement('div');
      moodCard.className = 'chart-card';
      moodCard.style.marginBottom = '14px';
      moodCard.innerHTML = '<div class="chart-title">🎭 Настроение по людям</div><div class="chart-sub">Какие эмоции чаще всего с кем</div><div id="moodStatsBlock"></div>';
      extra.appendChild(moodCard);
      renderMoodStats();
      if (state.connections.length) {
        const mapCard = document.createElement('div');
        mapCard.className = 'chart-card connmap-preview';
        mapCard.style.marginBottom = '14px';
        mapCard.innerHTML = `
          <div style="display:flex;align-items:center;gap:14px;">
            <span style="font-size:32px;line-height:1;">🗺️</span>
            <div style="flex:1;">
              <div class="chart-title" style="margin-bottom:2px;">Карта связей</div>
              <div class="chart-sub" style="margin-bottom:0;">Твоё окружение · ${state.connections.length} ${plural(state.connections.length,'связь','связи','связей')}</div>
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--mint-2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </div>`;
        mapCard.addEventListener('click', openConnMapFull);
        extra.appendChild(mapCard);
      }
    }
  });
}

function renderMoodStats() {
  const block = document.getElementById('moodStatsBlock');
  if (!block) return;
  const moodByConn = {};
  state.entries.forEach(e => {
    if (!e.mood) return;
    e.tags.forEach(t => {
      if (!moodByConn[t]) moodByConn[t] = {};
      moodByConn[t][e.mood] = (moodByConn[t][e.mood]||0)+1;
    });
  });
  if (!Object.keys(moodByConn).length) {
    block.innerHTML = '<p style="color:var(--ink-4);font-size:13px;padding:8px 0;">Пока нет записей с настроением</p>';
    return;
  }
  block.innerHTML = '';
  Object.entries(moodByConn).forEach(([cid, moods]) => {
    const conn = state.connections.find(c=>c.id===cid);
    if (!conn) return;
    const topMood = Object.entries(moods).sort((a,b)=>b[1]-a[1])[0];
    const m = moodById(topMood[0]);
    if (!m) return;
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);';
    row.innerHTML = '<div class="avatar '+conn.color+'" style="width:30px;height:30px;font-size:11px;">'+initials(conn.name)+'</div>'
      +'<span style="flex:1;font-size:13px;font-weight:500;">'+conn.name+'</span>'
      +'<span style="font-size:18px;">'+m.emoji+'</span>'
      +'<span style="font-size:11px;color:var(--ink-3);">'+m.label+'</span>';
    block.appendChild(row);
  });
}

function openConnMapFull() {
  const total = state.connections.length;
  if (!total) return;

  // ── Overlay shell (mounted first so we can measure it) ──
  const overlay = document.createElement('div');
  overlay.className = 'connmap-fs';

  const header = document.createElement('div');
  header.className = 'connmap-fs-header';
  header.innerHTML = `
    <button class="connmap-fs-back" id="cmBack" aria-label="Назад">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </button>
    <div style="flex:1;">
      <div style="font-family:'Fraunces',serif;font-size:18px;font-weight:500;letter-spacing:-0.01em;">Карта связей</div>
      <div style="font-size:12px;color:var(--ink-3);margin-top:1px;">
        ${total} ${plural(total,'связь','связи','связей')} · перемещай узлы
      </div>
    </div>
    <button class="connmap-fs-reset" id="cmReset" title="Сбросить" aria-label="Сбросить">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>`;

  const body = document.createElement('div');
  body.className = 'connmap-fs-body';

  overlay.appendChild(header);
  overlay.appendChild(body);
  document.getElementById('app').appendChild(overlay);

  overlay.querySelector('#cmBack').addEventListener('click', () => {
    ro.disconnect();
    overlay.remove();
  });

  // ── Build SVG after layout is stable ──
  let currentSvg = null;

  function buildSVG() {
    const BW = body.offsetWidth  || 390;
    const BH = body.offsetHeight || 640;
    if (currentSvg) currentSvg.svg.remove();
    currentSvg = _buildConnMapSvg(BW, BH);
    body.appendChild(currentSvg.svg);
  }

  // Rebuild on orientation change / resize
  const ro = new ResizeObserver(() => buildSVG());
  ro.observe(body);

  // Initial build after two frames so body has real dimensions
  requestAnimationFrame(() => requestAnimationFrame(buildSVG));

  overlay.querySelector('#cmReset').addEventListener('click', () => {
    if (currentSvg) currentSvg.reset();
  });
}

function _buildConnMapSvg(BW, BH) {
  const total = state.connections.length;
  const colMap = {mint:'#4cc9a0',rose:'#f9a8d4',warm:'#fcd34d',cool:'#93c5fd',violet:'#c4b5fd'};

  // ── Adaptive geometry ──────────────────────────────────────────────
  // Node radius scales down when there are many connections
  const maxBudget = Math.min(BW, BH) * 0.42;            // max orbit radius
  const rawNodeR  = Math.floor(maxBudget * Math.sin(Math.PI / Math.max(total, 1)) - 5);
  const nodeR     = Math.max(16, Math.min(26, rawNodeR)); // clamp 16–26 px

  const minChord  = nodeR * 2 + 8;
  const R = total <= 1
    ? maxBudget * 0.5
    : Math.min(maxBudget, minChord / (2 * Math.sin(Math.PI / total)));

  const cx = BW / 2, cy = BH / 2;
  const angleOffset = -Math.PI / 2;

  const iniFs   = Math.max(9,  Math.round(nodeR * 0.52));  // initials font-size
  const labelFs = Math.max(8,  Math.round(nodeR * 0.44));  // name label font-size
  const labelGap = nodeR + 10;                              // label offset from centre

  // ── Initial positions ──────────────────────────────────────────────
  const conn = state.connections;
  const pos  = conn.map((c, i) => ({
    x:   cx + R * Math.cos(angleOffset + (2 * Math.PI / total) * i),
    y:   cy + R * Math.sin(angleOffset + (2 * Math.PI / total) * i),
    ox:  cx + R * Math.cos(angleOffset + (2 * Math.PI / total) * i), // origin (for reset)
    oy:  cy + R * Math.sin(angleOffset + (2 * Math.PI / total) * i),
    col: colMap[c.color] || '#4cc9a0',
  }));

  // ── SVG ────────────────────────────────────────────────────────────
  const NS  = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${BW} ${BH}`);
  svg.style.cssText = [
    'width:100%', 'height:100%', 'display:block',
    'touch-action:none', '-webkit-user-select:none', 'user-select:none',
  ].join(';');

  // Defs (clipPaths for photos)
  const defs = document.createElementNS(NS, 'defs');
  svg.appendChild(defs);

  // Keyframe animations
  const styleEl = document.createElementNS(NS, 'style');
  styleEl.textContent = `
    @keyframes mnPop  { from{opacity:0;transform:scale(.1)} to{opacity:1;transform:scale(1)} }
    @keyframes mnFade { from{opacity:0} to{opacity:1} }
    .mn-c { transform-box:fill-box; transform-origin:center;
            animation: mnPop .5s cubic-bezier(.34,1.56,.64,1) both; }
    .mn-t { animation: mnFade .45s ease both; }
    .map-node-g { cursor:grab; }
    .map-node-g:active { cursor:grabbing; }
  `;
  svg.appendChild(styleEl);

  const gLines  = document.createElementNS(NS, 'g');
  const gNodes  = document.createElementNS(NS, 'g');
  const gCenter = document.createElementNS(NS, 'g');
  svg.appendChild(gLines);
  svg.appendChild(gNodes);
  svg.appendChild(gCenter); // center node always on top

  // ── Centre node ────────────────────────────────────────────────────
  const crOuter = nodeR + 8;
  const crInner = nodeR;

  [[crOuter, 'var(--mint)', '.10', '0s', true],
   [crInner, 'var(--mint)', '1',   '0s', false],
  ].forEach(([r, fill, opacity, delay, isGlow]) => {
    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', r);
    c.setAttribute('fill', fill); c.setAttribute('opacity', opacity);
    if (!isGlow) c.setAttribute('class', 'mn-c');
    c.style.animationDelay = delay;
    gCenter.appendChild(c);
  });

  // Centre photo or initials
  if (state.user.avatar) {
    const cClipId = 'cm-c-clip';
    const cp = document.createElementNS(NS, 'clipPath'); cp.setAttribute('id', cClipId);
    const cc = document.createElementNS(NS, 'circle');
    cc.setAttribute('cx', cx); cc.setAttribute('cy', cy); cc.setAttribute('r', crInner);
    cp.appendChild(cc); defs.appendChild(cp);
    const img = document.createElementNS(NS, 'image');
    img.setAttribute('x', cx - crInner); img.setAttribute('y', cy - crInner);
    img.setAttribute('width', crInner * 2); img.setAttribute('height', crInner * 2);
    img.setAttribute('href', state.user.avatar);
    img.setAttribute('clip-path', `url(#${cClipId})`);
    img.setAttribute('preserveAspectRatio', 'xMidYMid slice');
    img.setAttribute('pointer-events', 'none');
    img.setAttribute('class', 'mn-t'); img.style.animationDelay = '.05s';
    gCenter.appendChild(img);
  } else {
    const cTxt = document.createElementNS(NS, 'text');
    cTxt.setAttribute('x', cx); cTxt.setAttribute('y', cy + 1);
    cTxt.setAttribute('text-anchor', 'middle'); cTxt.setAttribute('dominant-baseline', 'middle');
    cTxt.setAttribute('font-size', iniFs + 2); cTxt.setAttribute('font-family', 'Fraunces,serif');
    cTxt.setAttribute('fill', 'white'); cTxt.setAttribute('font-weight', '600');
    cTxt.setAttribute('pointer-events', 'none');
    cTxt.setAttribute('class', 'mn-t'); cTxt.style.animationDelay = '.1s';
    cTxt.textContent = initials(state.user.name);
    gCenter.appendChild(cTxt);
  }

  // ── Connection nodes ───────────────────────────────────────────────
  const lineEls  = [];
  const nodeGrps = [];

  function applyPos(idx) {
    const {x, y} = pos[idx];
    nodeGrps[idx].setAttribute('transform', `translate(${x.toFixed(1)},${y.toFixed(1)})`);
    // Label above if node is in top half, below otherwise
    nodeGrps[idx].querySelector('.mn-name')
      .setAttribute('y', y < cy ? -(labelGap) : (labelGap + 4));
    // Dashed line: from edge of centre circle → edge of node circle
    const dx = x - cx, dy = y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 0) {
      const x1 = cx + dx / dist * (crInner + 3);
      const y1 = cy + dy / dist * (crInner + 3);
      const x2 = x  - dx / dist * (nodeR  + 3);
      const y2 = y  - dy / dist * (nodeR  + 3);
      const l = lineEls[idx];
      l.setAttribute('x1', x1.toFixed(1)); l.setAttribute('y1', y1.toFixed(1));
      l.setAttribute('x2', x2.toFixed(1)); l.setAttribute('y2', y2.toFixed(1));
    }
  }

  conn.forEach((c, i) => {
    const delay      = (i * 0.035).toFixed(2) + 's';
    const col        = pos[i].col;
    const photo      = c.photo || null;
    const dispName   = c.name.length > 9 ? c.name.slice(0, 8) + '…' : c.name;

    // Line
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('stroke', 'var(--line-2)');
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('stroke-dasharray', '4 3');
    line.setAttribute('opacity', '0.6');
    line.setAttribute('class', 'mn-t');
    line.style.animationDelay = delay;
    gLines.appendChild(line);
    lineEls.push(line);

    // Node group (positioned via transform)
    const g = document.createElementNS(NS, 'g');
    g.setAttribute('class', 'map-node-g');
    g.dataset.idx = i;

    // Outer glow ring
    const glow = document.createElementNS(NS, 'circle');
    glow.setAttribute('cx', 0); glow.setAttribute('cy', 0); glow.setAttribute('r', nodeR + 5);
    glow.setAttribute('fill', col); glow.setAttribute('opacity', '.08');
    glow.setAttribute('pointer-events', 'none');
    g.appendChild(glow);

    // Main circle
    const circle = document.createElementNS(NS, 'circle');
    circle.setAttribute('cx', 0); circle.setAttribute('cy', 0); circle.setAttribute('r', nodeR);
    circle.setAttribute('fill', photo ? col + '44' : col + '22');
    circle.setAttribute('stroke', col); circle.setAttribute('stroke-width', '1.5');
    circle.setAttribute('class', 'mn-c');
    circle.style.animationDelay = delay;
    g.appendChild(circle);

    if (photo) {
      // Circular photo via clipPath
      const clipId = `cm-clip-${i}`;
      const cp = document.createElementNS(NS, 'clipPath'); cp.setAttribute('id', clipId);
      const cc = document.createElementNS(NS, 'circle');
      cc.setAttribute('cx', 0); cc.setAttribute('cy', 0); cc.setAttribute('r', nodeR - 1);
      cp.appendChild(cc); defs.appendChild(cp);

      const img = document.createElementNS(NS, 'image');
      img.setAttribute('x', -nodeR + 1); img.setAttribute('y', -nodeR + 1);
      img.setAttribute('width', (nodeR - 1) * 2); img.setAttribute('height', (nodeR - 1) * 2);
      img.setAttribute('href', photo);
      img.setAttribute('clip-path', `url(#${clipId})`);
      img.setAttribute('preserveAspectRatio', 'xMidYMid slice');
      img.setAttribute('pointer-events', 'none');
      img.setAttribute('class', 'mn-t');
      img.style.animationDelay = delay;
      g.appendChild(img);
    } else {
      // Initials text
      const iniT = document.createElementNS(NS, 'text');
      iniT.setAttribute('x', 0); iniT.setAttribute('y', 1);
      iniT.setAttribute('text-anchor', 'middle'); iniT.setAttribute('dominant-baseline', 'middle');
      iniT.setAttribute('font-size', iniFs); iniT.setAttribute('font-family', 'Fraunces,serif');
      iniT.setAttribute('fill', col); iniT.setAttribute('font-weight', '600');
      iniT.setAttribute('pointer-events', 'none');
      iniT.setAttribute('class', 'mn-t');
      iniT.style.animationDelay = delay;
      iniT.textContent = initials(c.name);
      g.appendChild(iniT);
    }

    // Name label (y set dynamically in applyPos)
    const nameT = document.createElementNS(NS, 'text');
    nameT.setAttribute('x', 0);
    nameT.setAttribute('text-anchor', 'middle');
    nameT.setAttribute('font-size', labelFs);
    nameT.setAttribute('font-family', 'Geist,sans-serif');
    nameT.setAttribute('fill', 'var(--ink-2)');
    nameT.setAttribute('font-weight', '500');
    nameT.setAttribute('pointer-events', 'none');
    nameT.setAttribute('class', 'mn-name mn-t');
    nameT.style.animationDelay = delay;
    nameT.textContent = dispName;
    g.appendChild(nameT);

    gNodes.appendChild(g);
    nodeGrps.push(g);
    applyPos(i);
  });

  // ── Drag via Pointer Events ────────────────────────────────────────
  let drag = null, ox = 0, oy = 0;

  function svgPt(e) {
    const pt  = svg.createSVGPoint();
    const src = e.touches ? e.touches[0] : e;
    pt.x = src.clientX; pt.y = src.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }

  gNodes.addEventListener('pointerdown', e => {
    const g = e.target.closest('.map-node-g'); if (!g) return;
    drag = +g.dataset.idx;
    const pt = svgPt(e);
    ox = pt.x - pos[drag].x;
    oy = pt.y - pos[drag].y;
    svg.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  svg.addEventListener('pointermove', e => {
    if (drag === null) return;
    const pt = svgPt(e);
    pos[drag].x = pt.x - ox;
    pos[drag].y = pt.y - oy;
    applyPos(drag);
    e.preventDefault();
  });

  svg.addEventListener('pointerup',     () => { drag = null; });
  svg.addEventListener('pointercancel', () => { drag = null; });

  // ── Reset helper (returned so header button can call it) ──────────
  function reset() {
    pos.forEach((p, i) => {
      p.x = p.ox; p.y = p.oy;
      applyPos(i);
    });
  }

  return { svg, reset };
}

let diarySearch = '';
let diaryPerson = 'all';

function renderDiary() {
  const v = el(`
    <div class="view">
      <h1 style="margin-bottom:6px;">Дневник</h1>
      <p style="color:var(--ink-3);font-size:13px;margin-bottom:16px;">${state.entries.length} ${plural(state.entries.length,'запись','записи','записей')}</p>
      <div class="search-bar diary-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--ink-4)"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="diarySearch" placeholder="Поиск по записям..." value="${diarySearch}">
      </div>
      <div class="person-filter-strip" id="personStrip">
        <div class="chip ${diaryPerson==='all'?'active':''}" data-p="all">Все</div>
        ${state.connections.map(c => `<div class="chip ${diaryPerson===c.id?'active':''}" data-p="${c.id}">@${c.name}</div>`).join('')}
      </div>
      <div id="diaryList"></div>
    </div>
  `);
  mainEl.innerHTML = '';
  mainEl.appendChild(v);
  v.querySelector('#diarySearch').addEventListener('input', e => { diarySearch = e.target.value; renderDiaryList(); });
  v.querySelectorAll('[data-p]').forEach(chip => chip.addEventListener('click', () => {
    diaryPerson = chip.dataset.p;
    v.querySelectorAll('[data-p]').forEach(c => c.classList.toggle('active', c.dataset.p === diaryPerson));
    renderDiaryList();
  }));
  renderDiaryList();
}

function renderDiaryList() {
  const listEl = document.getElementById('diaryList');
  if (!listEl) return;
  let items = [...state.entries].sort((a,b) => b.date.localeCompare(a.date));
  if (diaryPerson !== 'all') items = items.filter(e => e.tags.includes(diaryPerson));
  if (diarySearch.trim()) {
    const q = diarySearch.trim().toLowerCase();
    items = items.filter(e => e.text.toLowerCase().includes(q));
  }
  if (!items.length) {
    listEl.innerHTML = '<div class="empty"><div class="icon">✎</div><h3>Ничего не найдено</h3><p>Попробуй другой запрос</p></div>';
    return;
  }

  // Group by month
  const groups = {};
  items.forEach(e => {
    const d = new Date(e.date);
    const key = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
    const label = MONTHS_RU[d.getMonth()] + ' ' + d.getFullYear();
    if (!groups[key]) groups[key] = { label, entries: [] };
    groups[key].entries.push(e);
  });

  listEl.innerHTML = '';
  Object.values(groups).forEach(g => {
    // Month label
    const monthLbl = document.createElement('div');
    monthLbl.className = 'month-group-label';
    monthLbl.textContent = g.label;
    listEl.appendChild(monthLbl);

    const groupWrap = document.createElement('div');
    groupWrap.className = 'diary-list';

    g.entries.forEach(e => {
      const d = fmtDate(e.date);

      const day = document.createElement('div');
      day.className = 'diary-day';

      const dateEl = document.createElement('div');
      dateEl.className = 'diary-date';
      dateEl.innerHTML = '<div class="d">' + d.day + '</div><div class="m">' + d.month + '</div>';

      const entry = document.createElement('div');
      entry.className = 'diary-entry';
      entry.dataset.entry = e.id;

      // Mood
      if (e.mood) {
        const m = moodById(e.mood);
        if (m) {
          const moodEl = document.createElement('div');
          moodEl.style.cssText = 'font-size:14px;margin-bottom:4px;';
          moodEl.innerHTML = m.emoji + ' <span style="font-size:11px;color:var(--ink-3);vertical-align:middle;">' + m.label + '</span>';
          entry.appendChild(moodEl);
        }
      }

      // Text
      const textEl = document.createElement('div');
      textEl.className = 'diary-text';
      textEl.textContent = e.text;
      entry.appendChild(textEl);

      // Tags
      const tags = e.tags || [];
      if (tags.length) {
        const tagsEl = document.createElement('div');
        tagsEl.className = 'diary-tags';
        tags.forEach(t => {
          const conn = state.connections.find(x => x.id === t);
          if (conn) {
            const tag = document.createElement('span');
            tag.className = 'tag';
            tag.textContent = '@' + conn.name;
            tagsEl.appendChild(tag);
          }
        });
        if (tagsEl.children.length) entry.appendChild(tagsEl);
      }

      entry.addEventListener('click', () => openEntry(e.id));
      day.appendChild(dateEl);
      day.appendChild(entry);
      groupWrap.appendChild(day);
    });

    listEl.appendChild(groupWrap);
  });
}

function openEntry(id) {
  const e = state.entries.find(x=>x.id===id);
  if (!e) return;
  const d = fmtDate(e.date);
  openModal(`
    <div class="modal-handle"></div>
    <div style="margin-bottom:18px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-3);">${d.day} ${d.month} ${d.year}</div>
        ${e.mood ? (() => { const m=moodById(e.mood); return m ? '<span style="font-size:14px;">'+m.emoji+'</span><span style="font-size:11px;color:var(--ink-3);">'+m.label+'</span>' : ''; })() : ''}
      </div>
      <div style="font-family:'Fraunces',serif;font-size:18px;line-height:1.6;font-weight:400;color:var(--ink);">${e.text}</div>
    </div>
    ${(e.tags||[]).length ? `
      <div class="section-label" style="margin-bottom:8px;">Люди</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;">
        ${e.tags.map(t => { const c=state.connections.find(x=>x.id===t); return c?`<span class="tag" style="padding:5px 10px;font-size:12px;cursor:pointer;" onclick="closeModal();openConnection('${c.id}')">@${c.name}</span>`:''}).join('')}
      </div>
    ` : ''}
    <button class="btn secondary" id="entryEditBtn">Редактировать</button>
    <button class="btn danger" style="margin-top:8px;" id="entryDeleteBtn">Удалить</button>
  `);
  // Wire buttons in entry modal
  setTimeout(() => {
    const editBtn = document.getElementById('entryEditBtn');
    const delBtn = document.getElementById('entryDeleteBtn');
    if (editBtn) editBtn.addEventListener('click', () => { closeModal(); setTimeout(() => openEntryForm(state.entries.find(x => x.id === id)), 50); });
    if (delBtn) delBtn.addEventListener('click', () => { closeModal(); setTimeout(() => deleteEntry(id), 50); });
  }, 50);
}

function deleteEntry(id) {
  confirm2('Удалить запись?', 'Это действие нельзя отменить.', () => {
    state.entries = state.entries.filter(e=>e.id!==id);
    saveState();
    toast('Запись удалена');
    navigate(currentView);
  });
}

function openEntryForm(existing) {
  const e = existing || { text: '', date: new Date().toISOString().slice(0,10), tags: [] };
  const tags = [...e.tags];
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">${existing ? 'Редактировать' : 'Новая запись'}</div>
    <div class="field"><label>Дата</label><input type="date" id="fDate" value="${e.date}"></div>
    <div class="field"><label>Что произошло</label><textarea id="fText" style="min-height:120px;" maxlength="2000" placeholder="Опиши момент...">${e.text}</textarea></div>
    <div class="field">
      <label>Кто был рядом</label>
      <div class="tag-picker" id="tagPicker">
        ${state.connections.length ? state.connections.map(c => `
          <div class="tag-pickable ${tags.includes(c.id)?'selected':''}" data-id="${c.id}">@${c.name}</div>
        `).join('') : '<span style="color:var(--ink-4);font-size:13px;">Сначала добавь связи</span>'}
      </div>
    </div>
    <div id="moodFieldSlot"></div>
    <button class="btn" id="saveEntry">${existing ? 'Сохранить' : 'Записать'}</button>
  `);
  // Inject mood picker
  const slot = document.getElementById('moodFieldSlot');
  if (slot) {
    const wrap = document.createElement('div');
    wrap.className = 'field';
    wrap.innerHTML = '<label>🎭 Настроение</label><div class="mood-picker" id="moodPicker"></div>';
    slot.appendChild(wrap);
    const picker = document.getElementById('moodPicker');
    MOODS.forEach(m => {
      const opt = document.createElement('div');
      opt.className = 'mood-opt' + (e.mood===m.id ? ' selected' : '');
      opt.dataset.mood = m.id;
      opt.textContent = m.emoji + ' ' + m.label;
      picker.appendChild(opt);
    });
  }
  document.querySelectorAll('#tagPicker .tag-pickable').forEach(t => t.addEventListener('click', () => {
    const tid = t.dataset.id;
    if (tags.includes(tid)) { tags.splice(tags.indexOf(tid),1); t.classList.remove('selected'); }
    else { tags.push(tid); t.classList.add('selected'); }
  }));
  let selectedMood = e.mood || null;
  document.querySelectorAll('#moodPicker .mood-opt').forEach(opt => opt.addEventListener('click', () => {
    document.querySelectorAll('#moodPicker .mood-opt').forEach(o=>o.classList.remove('selected'));
    opt.classList.add('selected');
    selectedMood = opt.dataset.mood;
  }));
  document.getElementById('saveEntry').addEventListener('click', () => {
    const text = document.getElementById('fText').value.trim();
    const date = document.getElementById('fDate').value;
    if (!text) { toast('Напиши хоть что-нибудь'); return; }
    if (existing) {
      Object.assign(existing, { text, date, tags: [...tags], mood: selectedMood });
      toast('Сохранено ✓');
    } else {
      state.entries.unshift({ id: uid(), text, date, tags: [...tags], mood: selectedMood });
      toast('Записано ✓');
    }
    saveState();
    closeModal();
    navigate(currentView);
  });
}

function editProfile() {
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">Профиль</div>
    <div class="field"><label>Имя</label><input id="pName" value="${state.user.name}"></div>
    <div class="field"><label>Подпись</label><input id="pBio" value="${state.user.bio||''}"></div>
    ${state.user.avatar ? '<button class="btn secondary" id="removeAvatar" style="margin-bottom:6px;">Удалить фото</button>' : ''}
    <button class="btn" id="saveProfile">Сохранить</button>
  `);
  const removeBtn = document.getElementById('removeAvatar');
  if (removeBtn) {
    removeBtn.addEventListener('click', () => {
      state.user.avatar = null;
      saveState();
      closeModal();
      toast('Фото удалено');
      navigate('profile');
    });
  }
  document.getElementById('saveProfile').addEventListener('click', () => {
    state.user.name = document.getElementById('pName').value.trim() || 'Я';
    state.user.bio = document.getElementById('pBio').value.trim();
    saveState();
    closeModal();
    toast('Сохранено ✓');
    navigate('profile');
  });
}


function exportData() {
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">Экспорт</div>
    <button class="btn secondary" id="exportJson" style="margin-bottom:8px;">📦 JSON — резервная копия</button>
    <button class="btn" id="exportPdf">📄 PDF — история отношений</button>
  `);
  setTimeout(() => {
    document.getElementById('exportJson').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'lovepulse-export.json'; a.click();
      URL.revokeObjectURL(url);
      closeModal(); toast('Экспортировано ✓');
    });
    const pdfBtn = document.getElementById('exportPdf');
    if (pdfBtn) pdfBtn.addEventListener('click', () => {
      closeModal();
      setTimeout(() => { window.print(); toast('Открыт диалог печати'); }, 100);
    });
  }, 50);
}

function resetData() {
  confirm2('Удалить все данные?', 'Все связи и записи будут удалены. Действие необратимо.', () => {
    localStorage.removeItem(DATA_KEY);
    state = structuredClone(DEFAULT_STATE);
    toast('Данные сброшены');
    navigate('home');
  });
}

// ============== MODAL ==============
const modal = document.getElementById('modal');
const modalContent = document.getElementById('modalContent');
let _swipeCtrl = null;

function openModal(html) {
  if (_swipeCtrl) { _swipeCtrl.abort(); _swipeCtrl = null; }
  modalContent.innerHTML = html;
  modalContent.removeAttribute('style');

  const closeBtn = document.createElement('button');
  closeBtn.className = 'modal-close-btn';
  closeBtn.setAttribute('aria-label', 'Закрыть');
  closeBtn.innerHTML = '&#x2715;';
  closeBtn.addEventListener('click', closeModal);
  modalContent.appendChild(closeBtn);
  modal.classList.add('open');

  // Swipe-down to close
  _swipeCtrl = new AbortController();
  const sig = { signal: _swipeCtrl.signal };
  let sy = 0, active = false;

  modalContent.addEventListener('touchstart', ev => {
    if (ev.touches.length !== 1) return;
    const top = modalContent.getBoundingClientRect().top;
    if (ev.touches[0].clientY - top > 80) return;
    sy = ev.touches[0].clientY;
    active = true;
    modalContent.style.transition = 'none';
  }, { passive: true, ...sig });

  modalContent.addEventListener('touchmove', ev => {
    if (!active) return;
    const dy = ev.touches[0].clientY - sy;
    if (dy > 0) modalContent.style.transform = `translateY(${(dy * 0.72).toFixed(1)}px)`;
  }, { passive: true, ...sig });

  modalContent.addEventListener('touchend', ev => {
    if (!active) return;
    active = false;
    const dy = ev.changedTouches[0].clientY - sy;
    if (dy > 90) {
      modalContent.style.transition = 'transform .2s ease-in';
      modalContent.style.transform = 'translateY(110%)';
      setTimeout(() => closeModal(), 200);
    } else {
      modalContent.style.transition = 'transform .3s cubic-bezier(.34,1.56,.64,1)';
      modalContent.style.transform = '';
      setTimeout(() => { modalContent.style.transition = ''; }, 320);
    }
  }, { passive: true, ...sig });
}

function closeModal() {
  modal.classList.remove('open');
  modalContent.removeAttribute('style');
  if (_swipeCtrl) { _swipeCtrl.abort(); _swipeCtrl = null; }
}
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

// ============== FAB ==============
fab.addEventListener('click', () => {
  if (currentView === 'connections') openConnectionForm();
  else if (currentView === 'diary') openEntryForm();
});

// ============== ONBOARDING ==============
function showOnboarding() {
  // Prevent duplicate onboarding overlay
  if (document.getElementById('onboard')) return;

  const slides = [
    { icon: '💚', title: 'Добро пожаловать в <em>LovePulse</em>', text: 'Приложение для отслеживания твоих связей — романтических, дружеских, семейных.' },
    { icon: '👥', title: 'Добавляй <em>людей</em>', text: 'Создавай карточки для близких. Указывай роль, статус своими словами и заметки о человеке.' },
    { icon: '📓', title: 'Веди <em>дневник</em>', text: 'Записывай моменты и тегай людей. Так формируется история каждой связи.' },
    { icon: '📊', title: 'Смотри <em>статистику</em>', text: 'Графики активности, топ людей, streak записей — всё чтобы замечать паттерны.' },
  ];
  let current = 0;
  const ob = el(`
    <div class="onboard" id="onboard">
      <div class="onboard-slide" id="obSlide">
        <div class="onboard-icon">${slides[0].icon}</div>
        <h2>${slides[0].title}</h2>
        <p>${slides[0].text}</p>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div class="onboard-dots">${slides.map((_,i) => `<div class="onboard-dot ${i===0?'active':''}" id="dot${i}"></div>`).join('')}</div>
      </div>
      <div class="onboard-footer">
        <button class="btn" id="obNext">Далее</button>
      </div>
    </div>
  `);
  document.getElementById('app').appendChild(ob);

  function goTo(idx) {
    current = idx;
    const s = slides[idx];
    const slide = ob.querySelector('#obSlide');
    slide.style.opacity = '0';
    setTimeout(() => {
      slide.querySelector('.onboard-icon').textContent = s.icon;
      slide.querySelector('h2').innerHTML = s.title;
      slide.querySelector('p').textContent = s.text;
      slide.style.opacity = '1';
    }, 150);
    ob.querySelectorAll('.onboard-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
    ob.querySelector('#obNext').textContent = idx === slides.length-1 ? 'Начать' : 'Далее';
  }
  ob.querySelector('#obSlide').style.transition = 'opacity .2s';
  ob.querySelector('#obNext').addEventListener('click', () => {
    if (current < slides.length-1) { goTo(current+1); }
    else {
      state.onboarded = true;
      saveState();
      ob.remove();
      navigate('home');
    }
  });
}

// ============== LOADER ==============
function showLoader(msg) {
  let el = document.getElementById('appLoader');
  if (!el) {
    el = document.createElement('div');
    el.id = 'appLoader';
    el.className = 'app-loader';
    el.innerHTML = `<div class="app-loader-spinner"></div><div class="app-loader-text"></div>`;
    document.body.appendChild(el);
  }
  el.querySelector('.app-loader-text').textContent = msg || '';
  el.classList.remove('hidden');
}
function hideLoader() {
  const el = document.getElementById('appLoader');
  if (!el) return;
  el.classList.add('hidden');
  setTimeout(() => { if (el.classList.contains('hidden')) el.remove(); }, 250);
}

function showApp() {
  hideLoader();
  document.getElementById('header').style.display = '';
  document.querySelector('.nav').style.display = '';
  document.getElementById('fab').style.display = '';
  if (!state.onboarded) showOnboarding();
  else navigate('home');
}

// ============== INIT ==============
function initApp() {
  showLoader('Загружаем…');
  state = loadLocalState();
  applyTheme(state.user.theme || 'light');
  showApp();
}

initApp();
