<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="Дневник отношений и трекер связей — веди записи, следи за пульсом близких, анализируй паттерны общения.">
<meta name="theme-color" content="#4cc9a0">
<title>LovePulse</title>
<link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='11' cy='16' r='9' stroke='%234cc9a0' stroke-width='2' fill='none'/%3E%3Ccircle cx='21' cy='16' r='9' stroke='%234cc9a0' stroke-width='2' fill='none'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%234cc9a0'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f8f6;
    --bg-elev: #ffffff;
    --bg-soft: #eef3ef;
    --ink: #0f1a14;
    --ink-2: #3a4a40;
    --ink-3: #6b7a70;
    --ink-4: #9aa69e;
    --line: #e2e8e3;
    --line-2: #d4dcd5;
    --mint: #4cc9a0;
    --mint-2: #2fb389;
    --mint-soft: #d8f1e6;
    --mint-deep: #0b3b2a;
    --emerald: #047857;
    --warn: #d97706;
    --rose: #e11d48;
    --shadow-sm: 0 1px 2px rgba(11,59,42,.04), 0 1px 1px rgba(11,59,42,.02);
    --shadow-md: 0 4px 16px -4px rgba(11,59,42,.08), 0 2px 6px -2px rgba(11,59,42,.04);
    --shadow-lg: 0 24px 48px -16px rgba(11,59,42,.12), 0 8px 16px -8px rgba(11,59,42,.06);
    --radius: 14px;
    --radius-sm: 10px;
    --radius-lg: 22px;
    --ease: cubic-bezier(.22,.61,.36,1);
    --ease-spring: cubic-bezier(.34,1.56,.64,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Geist', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* Phone frame */
  .app {
    max-width: 480px;
    margin: 0 auto;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  /* Top status / header */
  .header {
    padding: 18px 22px 14px;
    background: var(--bg);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid transparent;
    transition: border-color .2s var(--ease);
  }
  .header.scrolled { border-bottom-color: var(--line); }
  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .logo-icon {
    flex-shrink: 0;
    display: block;
  }
  .logo-orbit-dot {
    animation: orbitPulse 2.2s ease-in-out infinite;
    transform-origin: 14px 11px;
  }
  @keyframes orbitPulse {
    0%, 100% { opacity: 1; r: 2.2px; }
    50%       { opacity: .7; r: 3px; }
  }
  .header-action {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: var(--bg-soft);
    display: grid; place-items: center;
    border: none;
    cursor: pointer;
    transition: transform .2s var(--ease), background .2s var(--ease);
  }
  .header-action:active { transform: scale(.93); background: var(--mint-soft); }

  /* Main scroll area */
  .main {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  .main::-webkit-scrollbar { width: 0; }

  .view {
    padding: 8px 22px 100px;
    animation: viewIn .4s var(--ease);
  }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Typography */
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 34px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: var(--ink);
  }
  h1 em {
    font-style: italic;
    color: var(--mint-2);
    font-weight: 300;
  }
  h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 20px;
    letter-spacing: -0.015em;
  }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    font-weight: 500;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-label a {
    text-transform: none;
    letter-spacing: 0;
    color: var(--mint-2);
    text-decoration: none;
    font-weight: 500;
    font-size: 12px;
  }

  /* Cards */
  .card {
    background: var(--bg-elev);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    padding: 18px;
    transition: transform .25s var(--ease), box-shadow .25s var(--ease), border-color .2s var(--ease);
  }
  .card:active { transform: scale(.985); }

  /* HOME — hero */
  .hero {
    background: linear-gradient(135deg, #1a3d2e 0%, #0b3b2a 50%, #0a4a35 100%);
    color: white;
    border-radius: var(--radius-lg);
    padding: 24px;
    position: relative;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -30%; right: -20%;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(76,201,160,.35), transparent 70%);
    filter: blur(20px);
  }
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,.04) 1px, transparent 0);
    background-size: 18px 18px;
    pointer-events: none;
  }
  .hero-greeting {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    opacity: .65;
    margin-bottom: 8px;
    position: relative;
  }
  .hero-name {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 18px;
    position: relative;
  }
  .hero-name em { font-style: italic; color: var(--mint); font-weight: 300; }
  .hero-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    position: relative;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,.1);
  }
  .hero-stat-num {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
  }
  .hero-stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: .6;
    margin-top: 4px;
  }

  /* Pulse strip */
  .pulse-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
    scroll-snap-type: x mandatory;
  }
  .pulse-strip::-webkit-scrollbar { display: none; }
  .pulse-card {
    flex: 0 0 114px;
    height: 114px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px;
    scroll-snap-align: start;
    position: relative;
    transition: transform .2s var(--ease);
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }
  .pulse-card:active { transform: scale(.96); }
  .pulse-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--mint-soft);
    color: var(--mint-deep);
    display: grid; place-items: center;
    font-weight: 600;
    font-size: 12px;
    margin-bottom: 8px;
    font-family: 'Fraunces', serif;
    flex-shrink: 0;
  }
  .pulse-name {
    font-weight: 500;
    font-size: 13px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .pulse-meta {
    font-size: 11px;
    color: var(--ink-3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: auto;
  }

  /* Feed entries */
  .feed { display: flex; flex-direction: column; gap: 12px; }
  .feed-item {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    gap: 14px;
    cursor: pointer;
    transition: transform .2s var(--ease), border-color .2s var(--ease);
  }
  .feed-item:active { transform: scale(.99); }
  .feed-icon {
    width: 38px; height: 38px;
    border-radius: 12px;
    flex-shrink: 0;
    display: grid; place-items: center;
    background: var(--mint-soft);
    color: var(--mint-deep);
  }
  .feed-icon.warm { background: #ffe8d4; color: #b85c1a; }
  .feed-icon.rose { background: #ffe1ea; color: #b91c4e; }
  .feed-content { flex: 1; min-width: 0; }
  .feed-title {
    font-weight: 500;
    font-size: 14px;
    margin-bottom: 3px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow-wrap: break-word;
    word-break: break-word;
  }
  .feed-sub {
    font-size: 12px;
    color: var(--ink-3);
  }
  .feed-time {
    font-size: 11px;
    color: var(--ink-4);
    flex-shrink: 0;
  }

  /* CONNECTIONS */
  .search-bar {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .search-bar input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
  }
  .search-bar input::placeholder { color: var(--ink-4); }

  .filter-chips {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin: 0 -22px 18px;
    padding: 0 22px;
    scrollbar-width: none;
  }
  .filter-chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
    cursor: pointer;
    transition: all .2s var(--ease);
    white-space: nowrap;
  }
  .chip.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  .chip:active { transform: scale(.95); }

  .connection-list { display: flex; flex-direction: column; gap: 10px; }
  .connection {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: transform .2s var(--ease);
  }
  .connection:active { transform: scale(.99); }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 17px;
    flex-shrink: 0;
  }
  .avatar.mint { background: var(--mint-soft); color: var(--mint-deep); }
  .avatar.rose { background: #ffe1ea; color: #b91c4e; }
  .avatar.warm { background: #ffe8d4; color: #b85c1a; }
  .avatar.cool { background: #dbeafe; color: #1e40af; }
  .avatar.violet { background: #ede9fe; color: #6d28d9; }
  .avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; }

  /* Connection photo upload widget */
  .conn-photo-upload {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--bg-soft); border: 2px dashed var(--line-2);
    display: grid; place-items: center; cursor: pointer; overflow: hidden;
    transition: border-color .2s, transform .15s;
    flex-shrink: 0;
  }
  .conn-photo-upload.has-photo { border: 2px solid var(--mint); }
  .conn-photo-upload:active { transform: scale(.94); }

  /* Fullscreen connection map overlay */
  .connmap-fs {
    position: absolute; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; flex-direction: column;
    animation: cmSlideUp .25s var(--ease) both;
  }
  @keyframes cmSlideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .connmap-fs-header {
    padding: 16px 18px 12px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    background: var(--bg);
  }
  .connmap-fs-back {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--bg-soft); border: none; cursor: pointer;
    display: grid; place-items: center; color: var(--ink);
    transition: transform .2s var(--ease);
  }
  .connmap-fs-back:active { transform: scale(.9); }
  .connmap-fs-reset {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-soft); border: none; cursor: pointer;
    display: grid; place-items: center; color: var(--ink-3);
    margin-left: auto; transition: transform .2s var(--ease);
  }
  .connmap-fs-reset:active { transform: scale(.88) rotate(90deg); }
  .connmap-fs-body {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .connmap-fs-body svg { display: block; }

  /* Map preview card in stats */
  .connmap-preview {
    cursor: pointer; transition: transform .2s var(--ease);
    -webkit-tap-highlight-color: transparent;
  }
  .connmap-preview:active { transform: scale(.98); }
  .conn-info { flex: 1; min-width: 0; }
  .conn-name {
    font-weight: 500;
    font-size: 15px;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .conn-meta {
    font-size: 12px;
    color: var(--ink-3);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--mint);
  }
  .role-tag {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    background: var(--bg-soft);
    padding: 3px 7px;
    border-radius: 4px;
    font-weight: 500;
  }

  /* STATS */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 18px;
  }
  .stat-tile {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
  }
  .stat-tile.feature {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, #ecfdf5, #d1fae5);
    border-color: #a7f3d0;
  }
  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 30px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 6px;
    overflow-wrap: break-word;
    word-break: break-word;
  }
  .stat-label {
    font-size: 12px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .stat-delta {
    font-size: 11px;
    color: var(--mint-2);
    margin-top: 4px;
    font-weight: 500;
  }
  .stat-delta.down { color: var(--rose); }

  /* Bar chart (CSS only) */
  .chart-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
  }
  .chart-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .chart-sub {
    font-size: 12px;
    color: var(--ink-3);
    margin-bottom: 18px;
  }
  .bars {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 120px;
    padding-top: 10px;
  }
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    height: 100%;
    justify-content: flex-end;
  }
  .bar {
    width: 100%;
    background: linear-gradient(180deg, var(--mint) 0%, var(--mint-2) 100%);
    border-radius: 6px 6px 2px 2px;
    transition: height .8s var(--ease-spring);
    min-height: 4px;
  }
  .bar-label {
    font-size: 10px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Donut */
  .donut-wrap {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .donut {
    width: 110px; height: 110px;
    flex-shrink: 0;
    position: relative;
  }
  .donut-center {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    text-align: center;
  }
  .donut-center .num {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 500;
    line-height: 1;
  }
  .donut-center .lbl {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    margin-top: 2px;
  }
  .donut-legend {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .legend-swatch {
    width: 10px; height: 10px;
    border-radius: 3px;
  }
  .legend-row .val {
    margin-left: auto;
    color: var(--ink-3);
    font-variant-numeric: tabular-nums;
  }

  /* Insight card */
  .insight {
    background: var(--ink);
    color: white;
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .insight::before {
    content: '✦';
    position: absolute;
    top: 14px; right: 16px;
    font-size: 18px;
    color: var(--mint);
  }
  .insight-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--mint);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .insight-text {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    line-height: 1.35;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .insight-text em {
    color: var(--mint);
    font-style: italic;
  }

  /* DIARY */
  .diary-list { display: flex; flex-direction: column; gap: 14px; }
  .diary-day {
    display: flex;
    gap: 14px;
  }
  .diary-date {
    flex-shrink: 0;
    width: 52px;
    text-align: center;
    padding-top: 4px;
  }
  .diary-date .d {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .diary-date .m {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    margin-top: 4px;
  }
  .diary-entry {
    flex: 1;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: transform .2s var(--ease);
  }
  .diary-entry:active { transform: scale(.99); }
  .diary-text {
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink-2);
    margin-bottom: 10px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
    overflow-wrap: break-word;
    word-break: break-word;
  }
  .diary-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    font-size: 11px;
    background: var(--mint-soft);
    color: var(--mint-deep);
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 500;
  }

  /* PROFILE */
  .profile-head {
    text-align: center;
    padding: 14px 0 28px;
  }
  .profile-avatar {
    width: 84px; height: 84px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--mint), var(--mint-2));
    color: white;
    display: grid;
    place-items: center;
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 500;
    margin: 0 auto 14px;
    box-shadow: 0 8px 24px -8px rgba(76,201,160,.4);
    overflow: hidden;
    position: relative;
  }
  .profile-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
    position: absolute;
    inset: 0;
  }
  .profile-avatar-wrap {
    position: relative;
    width: 84px;
    margin: 0 auto 14px;
    cursor: pointer;
  }
  .avatar-edit-btn {
    position: absolute;
    bottom: 0; right: 0;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--ink);
    color: white;
    display: grid; place-items: center;
    border: 2px solid var(--bg);
    cursor: pointer;
    transition: transform .2s var(--ease);
  }
  [data-theme="dark"] .avatar-edit-btn {
    background: var(--mint-2);
    color: #021a0e;
  }
  .profile-avatar-wrap:active .avatar-edit-btn { transform: scale(.9); }
  .profile-name {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .profile-bio {
    font-size: 13px;
    color: var(--ink-3);
    margin-top: 4px;
  }

  .menu-group {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 14px;
  }
  .menu-item {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--line);
    transition: background .15s var(--ease);
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:active { background: var(--bg-soft); }
  .menu-icon {
    width: 32px; height: 32px;
    border-radius: 9px;
    background: var(--bg-soft);
    display: grid; place-items: center;
    color: var(--ink-2);
    flex-shrink: 0;
  }
  .menu-icon.danger { background: #fee2e2; color: var(--rose); }
  .menu-label { flex: 1; font-size: 14px; font-weight: 500; }
  .menu-value { font-size: 13px; color: var(--ink-3); }
  .menu-chev { color: var(--ink-4); }

  /* BOTTOM NAV */
  .nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(246,248,246,.85);
    backdrop-filter: saturate(1.6) blur(18px);
    -webkit-backdrop-filter: saturate(1.6) blur(18px);
    border-top: 1px solid var(--line);
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 50;
  }
  .nav-btn {
    background: none;
    border: none;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 4px;
    cursor: pointer;
    color: var(--ink-4);
    transition: color .2s var(--ease);
    position: relative;
  }
  .nav-btn.active { color: var(--ink); }
  .nav-btn .nav-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .nav-btn svg { transition: transform .3s var(--ease-spring); }
  .nav-btn.active svg { transform: translateY(-2px) scale(1.08); }
  .web-logo { display: none; }

  /* FAB */
  .fab {
    position: absolute;
    bottom: 84px;
    right: 22px;
    width: 54px; height: 54px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--ink), #1a3d2e);
    color: white;
    display: grid; place-items: center;
    box-shadow: 0 12px 28px -6px rgba(11,59,42,.4);
    cursor: pointer;
    z-index: 40;
    transition: transform .25s var(--ease-spring);
  }
  .fab:active { transform: scale(.9); }
  .fab svg { transition: transform .3s var(--ease); }

  /* MODAL */
  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(11,59,42,.4);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: flex-end;
    animation: fadeIn .2s var(--ease);
  }
  .modal-backdrop.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--bg);
    width: 100%;
    border-radius: 24px 24px 0 0;
    padding: 22px 22px calc(22px + env(safe-area-inset-bottom));
    max-height: 88vh;
    overflow-y: auto;
    overflow-x: hidden;
    overflow-wrap: break-word;
    word-break: break-word;
    animation: slideUp .35s var(--ease-spring);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 38px; height: 4px;
    background: var(--line-2);
    border-radius: 999px;
    margin: 0 auto 18px;
  }
  .modal-close-btn { display: none; }
  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.015em;
    margin-bottom: 18px;
  }

  /* FORM */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    border-radius: 11px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color .2s var(--ease), box-shadow .2s var(--ease);
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--mint-2);
    box-shadow: 0 0 0 3px var(--mint-soft);
  }
  .field textarea { resize: none; min-height: 90px; line-height: 1.5; }

  .role-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .role-opt {
    padding: 10px 8px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    border-radius: 10px;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--ink-2);
    transition: all .2s var(--ease);
  }
  .role-opt.selected {
    border-color: var(--mint-2);
    background: var(--mint-soft);
    color: var(--mint-deep);
  }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--ink);
    color: white;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: transform .2s var(--ease), opacity .2s var(--ease);
    margin-top: 10px;
  }
  .btn:active { transform: scale(.985); }
  .btn.secondary {
    background: var(--bg-soft);
    color: var(--ink);
  }
  .btn.danger {
    background: var(--rose);
  }

  .tag-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    border-radius: 11px;
    min-height: 48px;
  }
  .tag-pickable {
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 999px;
    background: var(--bg-soft);
    color: var(--ink-2);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .2s var(--ease);
  }
  .tag-pickable.selected {
    background: var(--mint-soft);
    color: var(--mint-deep);
    border-color: var(--mint-2);
  }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-3);
  }
  .empty .icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: .4;
  }
  .empty h3 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .empty p { font-size: 13px; }

  /* TOAST */
  .toast {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--ink);
    color: white;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: all .3s var(--ease-spring);
    z-index: 200;
    box-shadow: var(--shadow-lg);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Detail page */
  .back-btn {
    background: var(--bg-soft);
    border: none;
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--ink-2);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    margin-bottom: 16px;
  }

  /* ── DARK THEME ── */
  [data-theme="dark"] {
    --bg: #0d1710;
    --bg-elev: #141f17;
    --bg-soft: #1a2a1e;
    --ink: #e8f0ea;
    --ink-2: #b8c9bc;
    --ink-3: #7a9080;
    --ink-4: #4a6050;
    --line: #1f2f22;
    --line-2: #263629;
    --mint-soft: #0d2d1f;
    --mint-deep: #7de8bc;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.2);
    --shadow-md: 0 4px 16px -4px rgba(0,0,0,.35);
    --shadow-lg: 0 24px 48px -16px rgba(0,0,0,.5);
  }
  [data-theme="dark"] .nav {
    background: rgba(13,23,16,.88);
  }
  [data-theme="dark"] .hero {
    background: linear-gradient(135deg, #0a2416 0%, #061a0f 50%, #092015 100%);
  }
  [data-theme="dark"] .field input,
  [data-theme="dark"] .field textarea,
  [data-theme="dark"] .field select {
    background: var(--bg-soft);
    color: var(--ink);
  }
  [data-theme="dark"] .btn.secondary {
    background: var(--bg-soft);
    color: var(--ink);
  }
  [data-theme="dark"] .modal {
    background: var(--bg-elev);
  }
  [data-theme="dark"] .tag-picker {
    background: var(--bg-soft);
  }
  [data-theme="dark"] .tag-pickable {
    background: var(--bg);
    color: var(--ink-2);
  }

  /* ── WEB LAYOUT ── */
  @media (min-width: 900px) {
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    .app {
      max-width: none;
      width: 100%;
      height: 100vh;
      min-height: unset;
      overflow: hidden;
      flex-direction: row;
      border-radius: 0;
      box-shadow: none;
      margin: 0;
    }
    .header { display: none; }
    .nav {
      position: relative;
      flex-shrink: 0;
      width: 240px;
      height: 100vh;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
      gap: 4px;
      padding: 28px 16px;
      border-top: none;
      border-right: 1px solid var(--line);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      background: var(--bg-elev);
      z-index: 10;
      overflow-y: auto;
    }
    .web-logo {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 20px;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px 20px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 8px;
      color: var(--ink);
    }
    .nav-btn {
      flex-direction: row;
      justify-content: flex-start;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 12px;
      font-size: 14px;
    }
    .nav-btn .nav-label { font-size: 14px; letter-spacing: 0; }
    .nav-btn.active { background: var(--mint-soft); color: var(--mint-2); }
    .nav-btn.active svg { transform: none; color: var(--mint-2); }
    .nav-btn svg { transition: none; }
    .main {
      flex: 1;
      overflow-y: auto;
      height: 100vh;
    }
    .fab { bottom: 28px; right: 28px; position: fixed; }
    .view { max-width: 960px; margin: 0 auto; padding: 32px 48px 60px; }
    .toast { position: fixed; }
    .confirm-overlay { position: fixed; }

    /* Desktop modal: centered dialog instead of bottom sheet */
    .modal-backdrop {
      position: fixed;
      align-items: center;
      justify-content: center;
    }
    .modal {
      width: 100%;
      max-width: 560px;
      border-radius: 20px;
      padding: 36px 40px 40px;
      max-height: 88vh;
      animation: modalIn .2s var(--ease);
      box-shadow: 0 12px 48px rgba(0,0,0,.18), 0 2px 8px rgba(0,0,0,.08);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)  translateY(0); }
    }
    .modal-handle { display: none; }
    .modal-title { font-size: 26px; margin-bottom: 24px; }
    .modal-close-btn {
      display: flex !important;
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--bg-soft);
      color: var(--ink-3);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
      transition: background .15s, color .15s;
    }
    .modal-close-btn:hover { background: var(--line); color: var(--ink); }
    .modal { position: relative; }

    /* Improve form fields spacing on desktop */
    .field { margin-bottom: 16px; }
    .field input, .field textarea, .field select { font-size: 15px; padding: 13px 16px; }
    .field textarea { min-height: 100px; }

    /* Role grid: single row of 3+3 with more padding */
    .role-opt { padding: 12px 10px; font-size: 13px; }

    /* Two-column layout for short fields */
    .modal-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 20px;
    }

    /* Btn improvements on desktop */
    .btn { padding: 15px; font-size: 15px; border-radius: 14px; }
    .btn:hover { opacity: .88; }
  }

  /* ── ONBOARDING ── */
  .onboard {
    position: absolute;
    inset: 0;
    background: var(--bg);
    z-index: 300;
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
  }
  .onboard-slide {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    text-align: center;
    animation: viewIn .4s var(--ease);
  }
  .onboard-icon {
    font-size: 64px;
    margin-bottom: 24px;
  }
  .onboard h2 {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .onboard h2 em { color: var(--mint-2); font-style: italic; font-weight: 300; }
  .onboard p {
    font-size: 15px;
    color: var(--ink-3);
    line-height: 1.6;
    max-width: 300px;
  }
  .onboard-dots {
    display: flex;
    gap: 6px;
    padding: 20px 0;
  }
  .onboard-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--line-2);
    transition: all .3s var(--ease);
  }
  .onboard-dot.active { background: var(--mint); width: 20px; border-radius: 3px; }
  .onboard-footer { padding: 16px 24px calc(24px + env(safe-area-inset-bottom)); }

  /* ── CONFIRM DIALOG ── */
  .confirm-overlay {
    position: absolute;
    inset: 0;
    background: rgba(11,59,42,.5);
    backdrop-filter: blur(6px);
    z-index: 250;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: fadeIn .2s var(--ease);
  }
  .confirm-box {
    background: var(--bg-elev);
    border-radius: var(--radius-lg);
    padding: 24px;
    width: 100%;
    max-width: 320px;
    box-shadow: var(--shadow-lg);
    animation: scaleIn .3s var(--ease-spring);
  }
  @keyframes scaleIn {
    from { transform: scale(.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .confirm-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.015em;
  }
  .confirm-text { font-size: 14px; color: var(--ink-3); margin-bottom: 20px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-actions .btn { margin-top: 0; flex: 1; }

  /* ── STREAK / ALERT WIDGET ── */
  .alert-card {
    background: linear-gradient(135deg, #fff8e6, #fff3d6);
    border: 1px solid #fcd34d;
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    cursor: pointer;
    transition: transform .2s var(--ease);
  }
  .alert-card:active { transform: scale(.99); }
  [data-theme="dark"] .alert-card {
    background: linear-gradient(135deg, #2a1f00, #261c00);
    border-color: #5a4500;
  }
  .alert-icon { font-size: 22px; flex-shrink: 0; }
  .alert-text { flex: 1; font-size: 13px; color: var(--ink-2); line-height: 1.4; }
  .alert-text strong { display: block; font-weight: 600; font-size: 14px; color: var(--ink); margin-bottom: 2px; }

  .streak-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--mint-soft);
    color: var(--mint-deep);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  /* ── CONN CARD ENHANCEMENTS ── */
  .conn-count {
    font-size: 11px;
    color: var(--ink-4);
    background: var(--bg-soft);
    border-radius: 6px;
    padding: 2px 7px;
    font-weight: 500;
    margin-right: 6px;
  }
  .sort-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    font-size: 12px;
    color: var(--ink-3);
  }
  .sort-btn {
    background: none;
    border: none;
    font-size: 12px;
    font-family: inherit;
    color: var(--ink-3);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all .15s var(--ease);
  }
  .sort-btn.active { background: var(--bg-soft); color: var(--ink); font-weight: 500; }

  /* ── DIARY ENHANCEMENTS ── */
  .month-group-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    font-weight: 500;
    padding: 18px 0 10px;
  }
  .diary-search {
    margin-bottom: 16px;
  }
  .person-filter-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin: 0 -22px 16px;
    padding: 0 22px;
    scrollbar-width: none;
  }
  .person-filter-strip::-webkit-scrollbar { display: none; }

  /* ── STATS ENHANCEMENTS ── */
  .heatmap {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 3px;
    margin: 8px 0;
  }
  .hm-cell {
    aspect-ratio: 1;
    border-radius: 3px;
    background: var(--line);
    transition: background .3s var(--ease);
  }
  .hm-cell.l1 { background: #a3e4cd; }
  .hm-cell.l2 { background: #4cc9a0; }
  .hm-cell.l3 { background: #2fb389; }
  .hm-cell.l4 { background: #0e7a58; }
  [data-theme="dark"] .hm-cell { background: #1a2a1e; }
  [data-theme="dark"] .hm-cell.l1 { background: #0d4530; }
  [data-theme="dark"] .hm-cell.l2 { background: #1a6b4a; }
  [data-theme="dark"] .hm-cell.l3 { background: #2fb389; }
  [data-theme="dark"] .hm-cell.l4 { background: #4cc9a0; }

  /* ── DARK: кнопки ── */
  [data-theme="dark"] .btn {
    background: var(--mint-2);
    color: #021a0e;
  }
  [data-theme="dark"] .btn:active { opacity: .85; }
  [data-theme="dark"] .btn.secondary {
    background: var(--bg-soft);
    color: var(--ink);
    border: 1px solid var(--line-2);
  }
  [data-theme="dark"] .btn.danger {
    background: #c0182e;
    color: white;
  }

  /* ── DARK: активные чипы и фильтры ── */
  [data-theme="dark"] .chip.active {
    background: var(--mint-2);
    color: #021a0e;
    border-color: var(--mint-2);
  }
  [data-theme="dark"] .sort-btn.active {
    background: var(--bg-soft);
    color: var(--ink);
  }

  /* ── DARK: FAB ── */
  [data-theme="dark"] .fab {
    background: linear-gradient(135deg, var(--mint-2), #0e5c38);
  }

  /* ── DARK: insight card ── */
  [data-theme="dark"] .insight {
    background: linear-gradient(135deg, #0d2d1f, #0a2016);
    border: 1px solid var(--line-2);
  }

  /* ── DARK: toast ── */
  [data-theme="dark"] .toast {
    background: var(--bg-soft);
    color: var(--ink);
    border: 1px solid var(--line-2);
  }

  /* ── DARK: confirm dialog ── */
  [data-theme="dark"] .confirm-box {
    background: var(--bg-soft);
    border: 1px solid var(--line-2);
  }

  /* ── DARK: onboarding ── */
  [data-theme="dark"] .onboard {
    background: var(--bg);
  }

  /* ── DARK: nav active state ── */
  [data-theme="dark"] .nav-btn.active {
    color: var(--mint);
  }

  /* ── DARK: header ── */
  [data-theme="dark"] .header {
    background: var(--bg);
  }
  [data-theme="dark"] .logo-icon circle {
    stroke: var(--mint);
  }
  [data-theme="dark"] .logo-orbit-dot {
    fill: var(--mint);
  }
  [data-theme="dark"] .header-action {
    background: var(--bg-soft);
    color: var(--ink-2);
  }

  /* ── DARK: profile avatar ── */
  [data-theme="dark"] .profile-avatar {
    background: linear-gradient(135deg, var(--mint-2), #0e5c38);
  }

  /* ── DARK: role-opt selected ── */
  [data-theme="dark"] .role-opt.selected {
    background: var(--mint-soft);
    color: var(--mint-deep);
    border-color: var(--mint-2);
  }

  /* ── DARK: search bar ── */
  [data-theme="dark"] .search-bar {
    background: var(--bg-soft);
    border-color: var(--line-2);
  }
  [data-theme="dark"] .search-bar input {
    background: transparent;
    color: var(--ink);
  }

  /* ── DARK: menu-item hover ── */
  [data-theme="dark"] .menu-item:active {
    background: var(--bg-soft);
  }
  [data-theme="dark"] .menu-icon {
    background: var(--bg-soft);
  }
  [data-theme="dark"] .menu-icon.danger {
    background: rgba(192,24,46,.15);
  }


  .top-person-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .top-person-row:last-child { border-bottom: none; }
  .top-bar-wrap { flex: 1; }
  .top-bar-track { height: 6px; background: var(--line); border-radius: 999px; overflow: hidden; }
  .top-bar-fill { height: 100%; background: var(--mint); border-radius: 999px; transition: width .8s var(--ease-spring); width: 0%; }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 4px 0;
  }
  .toggle-track {
    width: 44px; height: 24px;
    border-radius: 999px;
    background: var(--line-2);
    position: relative;
    transition: background .25s var(--ease);
    flex-shrink: 0;
  }
  .toggle-track.on { background: var(--mint); }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 1px 4px rgba(0,0,0,.2);
    transition: transform .25s var(--ease-spring);
  }
  .toggle-track.on .toggle-thumb { transform: translateX(20px); }


  /* ── MAP СВЯЗЕЙ ── */
  .conn-map-wrap {
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 14px;
  }
  .conn-map-wrap svg { display: block; width: 100%; }

  /* ── HEALTH ── */
  .health-ring { position: relative; display: inline-grid; place-items: center; }
  .health-ring svg { transform: rotate(-90deg); }
  .health-ring-track { stroke: var(--line-2); }
  .health-ring-fill { transition: stroke-dashoffset .8s var(--ease-spring); }
  .health-score-label {
    position: absolute; font-size: 11px; font-weight: 700;
    font-variant-numeric: tabular-nums; letter-spacing: -.03em;
  }
  .health-badge {
    display: inline-block; font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 6px;
  }
  .health-badge.great { background:#d1fae5;color:#065f46; }
  .health-badge.good  { background:#fef9c3;color:#854d0e; }
  .health-badge.weak  { background:#ffedd5;color:#9a3412; }
  [data-theme="dark"] .health-badge.great { background:#052e16;color:#6ee7b7; }
  [data-theme="dark"] .health-badge.good  { background:#2d1f00;color:#fcd34d; }
  [data-theme="dark"] .health-badge.weak  { background:#2d1000;color:#fb923c; }
  [data-theme="dark"] .stat-tile.feature {
    background: linear-gradient(135deg, #0a2a1a, #0f3d26);
    border-color: #1a5c38;
  }

  /* ── MOOD TAGS ── */
  .mood-picker { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
  .mood-opt {
    padding: 7px 12px; border-radius: 999px; border: 1.5px solid var(--line);
    background: var(--bg-elev); cursor: pointer; font-size: 13px;
    transition: all .2s var(--ease);
  }
  .mood-opt.selected { border-color: var(--mint-2); background: var(--mint-soft); }
  .mood-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
  }

  /* ── ANNIVERSARY / TIMELINE ── */
  .anniversary-card {
    background: linear-gradient(135deg,#fff8f0,#fff3e8);
    border: 1px solid #fcd34d; border-radius: var(--radius);
    padding: 14px 16px; display: flex; align-items: center;
    gap: 12px; margin-bottom: 16px; cursor: pointer;
    transition: transform .2s var(--ease);
  }
  .anniversary-card:active { transform: scale(.99); }
  [data-theme="dark"] .anniversary-card {
    background: linear-gradient(135deg,#2a1c00,#261800);
    border-color: #5a4000;
  }
  .timeline-wrap {
    padding: 8px 0; display: flex; flex-direction: column; gap: 0;
  }
  .timeline-item {
    display: flex; gap: 12px; padding: 10px 0;
    position: relative;
  }
  .timeline-line {
    width: 1px; background: var(--line); position: absolute;
    left: 15px; top: 30px; bottom: -10px;
  }
  .timeline-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--mint); flex-shrink: 0;
    margin-top: 6px; margin-left: 12px;
    box-shadow: 0 0 0 3px var(--mint-soft);
  }
  .timeline-content { flex: 1; }
  .timeline-date { font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 2px; }
  .timeline-text { font-size: 13px; color: var(--ink-2); line-height: 1.4; }

  /* ── PDF PRINT ── */
  @media print {
    .nav, .header, .fab, .modal-backdrop, .toast { display: none !important; }
    .app { max-width: 100%; height: auto; overflow: visible; }
    .main { height: auto; overflow: visible; }
    .view { padding-bottom: 20px; }
  }

  /* ── AUTH SCREEN ── */
  .auth-screen {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px 60px;
  }
  .auth-logo {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
    color: var(--ink);
  }
  .auth-tabs {
    display: flex;
    background: var(--bg-soft);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
    width: 100%;
    max-width: 340px;
  }
  .auth-tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 9px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--ink-3);
    transition: all .2s var(--ease);
  }
  .auth-tab.active {
    background: var(--bg-elev);
    color: var(--ink);
    box-shadow: var(--shadow-sm);
  }
  .auth-form { width: 100%; max-width: 340px; }
  .auth-error {
    background: #fee2e2;
    color: #b91c1c;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    margin-bottom: 12px;
  }
  [data-theme="dark"] .auth-error { background: rgba(185,28,28,.2); color: #fca5a5; }
  .auth-hint {
    text-align: center;
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 16px;
    line-height: 1.6;
  }

  /* ── WELCOME POPUP ── */
  .welcome-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    animation: fadeIn .25s var(--ease);
  }
  .welcome-sheet {
    width: 100%;
    background: var(--bg-elev);
    border-radius: 24px 24px 0 0;
    padding: 28px 28px 40px;
    animation: slideUp .35s var(--ease);
  }
  .welcome-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
    text-align: center;
  }
  .welcome-sheet h2 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 8px;
  }
  .welcome-sheet p {
    text-align: center;
    color: var(--ink-3);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .welcome-sheet .btn { width: 100%; margin-bottom: 10px; }
  .welcome-skip {
    display: block;
    text-align: center;
    font-size: 13px;
    color: var(--ink-4);
    cursor: pointer;
    padding: 4px;
  }
  @media (min-width: 900px) {
    .welcome-overlay { align-items: center; justify-content: center; }
    .welcome-sheet { max-width: 420px; border-radius: 24px; padding: 36px 36px 36px; }
  }

  /* ── APP LOADER ── */
  .app-loader {
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    opacity: 1;
    transition: opacity .2s var(--ease);
  }
  .app-loader.hidden { opacity: 0; pointer-events: none; }
  .app-loader-spinner {
    width: 34px;
    height: 34px;
    border: 2.5px solid var(--line-2);
    border-top-color: var(--mint);
    border-radius: 50%;
    animation: loaderSpin .65s linear infinite;
  }
  @keyframes loaderSpin { to { transform: rotate(360deg); } }
  .app-loader-text {
    font-size: 14px;
    color: var(--ink-3);
    font-weight: 500;
    letter-spacing: .01em;
  }
</style>
</head>
<body>
<div id="appLoader" class="app-loader">
  <div class="app-loader-spinner"></div>
  <div class="app-loader-text">Загружаем…</div>
</div>
<div class="app" id="app">

  <header class="header" id="header">
    <div class="logo">
      <svg class="logo-icon" width="28" height="22" viewBox="0 0 28 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Левый круг -->
        <circle cx="10" cy="11" r="8.5" stroke="#4cc9a0" stroke-width="1.5" fill="none" opacity="0.9"/>
        <!-- Правый круг -->
        <circle cx="18" cy="11" r="8.5" stroke="#4cc9a0" stroke-width="1.5" fill="none" opacity="0.9"/>
        <!-- Точка в центре пересечения -->
        <circle class="logo-orbit-dot" cx="14" cy="11" r="2.2" fill="#4cc9a0"/>
      </svg>
      LovePulse
    </div>
    <button class="header-action" id="searchBtn" aria-label="Поиск">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>

  <main class="main" id="main">
    <!-- views injected here -->
  </main>

  <button class="fab" id="fab" aria-label="Добавить">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <nav class="nav">
    <div class="web-logo">
      <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
        <circle cx="9" cy="14" r="8" stroke="var(--mint)" stroke-width="2.2" fill="none"/>
        <circle cx="19" cy="14" r="8" stroke="var(--mint)" stroke-width="2.2" fill="none"/>
        <circle cx="14" cy="14" r="3" fill="var(--mint)"/>
      </svg>
      LovePulse
    </div>
    <button class="nav-btn active" data-view="home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      <span class="nav-label">Лента</span>
    </button>
    <button class="nav-btn" data-view="connections">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="nav-label">Связи</span>
    </button>

      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 16 4-6 4 3 5-7"/></svg>
      <span class="nav-label">Статистика</span>

      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span class="nav-label">Дневник</span>
    </button>
    <button class="nav-btn" data-view="profile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
      <span class="nav-label">Профиль</span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <div class="modal-backdrop" id="modal">
    <div class="modal" id="modalContent">
      <div class="modal-handle"></div>
      <!-- modal injected -->
    </div>
  </div>

</div>

<script>
// ============== LOCAL STORAGE ==============
const DATA_KEY = 'lovepulse_data_v4';

// ============== STATE ==============
const DEFAULT_STATE = {
  user: { name: '', bio: '', theme: 'light' },
  connections: [],
  entries: [],
  onboarded: false
};

let state = structuredClone(DEFAULT_STATE);

function _mergeWithDefaults(parsed) {
  const s = { ...structuredClone(DEFAULT_STATE), ...parsed };
  if (!s.user) s.user = { name: 'Новый пользователь', bio: '', theme: 'light' };
  if (!s.user.name) s.user.name = 'Новый пользователь';
  if (!s.user.theme) s.user.theme = 'light';
  if (s.onboarded === undefined) s.onboarded = false;
  if (s.entries) s.entries.forEach(e => { if (!Array.isArray(e.tags)) e.tags = []; });
  return s;
}

function loadLocalState() {
  try {
    const raw = localStorage.getItem(DATA_KEY);
    if (!raw) return structuredClone(DEFAULT_STATE);
    return _mergeWithDefaults(JSON.parse(raw));
  } catch { return structuredClone(DEFAULT_STATE); }
}

function saveState() {
  localStorage.setItem(DATA_KEY, JSON.stringify(state));
}
function uid() { return Math.random().toString(36).slice(2,9); }

const ROLES = {
  partner: 'Партнёр',
  friend: 'Друг',
  family: 'Семья',
  buddy: 'Приятель',
  colleague: 'Коллега',
  ex: 'Бывшие',
};
const COLORS = ['mint','rose','warm','cool','violet'];
const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_SHORT = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];

// ============== THEME ==============
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
}

// ============== ROUTING ==============
let currentView = 'home';
const mainEl = document.getElementById('main');
const fab = document.getElementById('fab');

const views = { home: renderHome, connections: renderConnections, stats: renderStats, diary: renderDiary, profile: renderProfile };

function navigate(view) {
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  mainEl.scrollTo({ top: 0 });
  mainEl.innerHTML = '';
  views[view]();
  fab.style.display = (view === 'connections' || view === 'diary') ? 'grid' : 'none';
}

document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', () => navigate(b.dataset.view)));
mainEl.addEventListener('scroll', () => {
  document.getElementById('header').classList.toggle('scrolled', mainEl.scrollTop > 4);
});

// Search button — global search modal
document.getElementById('searchBtn').addEventListener('click', () => {
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">Поиск</div>
    <div class="search-bar" style="margin-bottom:16px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--ink-4)"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="globalSearchInput" placeholder="Имя, запись, статус..." autofocus>
    </div>
    <div id="globalSearchResults"><p style="color:var(--ink-4);font-size:13px;text-align:center;padding:20px 0;">Начни вводить...</p></div>
  `);
  setTimeout(() => {
    const input = document.getElementById('globalSearchInput');
    if (!input) return;
    input.focus();
    input.addEventListener('input', renderGlobalSearch);
  }, 100);
});

function renderGlobalSearch() {
  const input = document.getElementById('globalSearchInput');
  const res = document.getElementById('globalSearchResults');
  if (!input || !res) return;
  const q = input.value.trim().toLowerCase();
  if (!q) {
    res.innerHTML = '<p style="color:var(--ink-4);font-size:13px;text-align:center;padding:20px 0;">Начни вводить...</p>';
    return;
  }
  const connHits = state.connections.filter(c =>
    c.name.toLowerCase().includes(q) ||
    (c.statusLabel||'').toLowerCase().includes(q) ||
    (c.note||'').toLowerCase().includes(q)
  );
  const entryHits = state.entries.filter(e => e.text.toLowerCase().includes(q)).slice(0, 5);

  res.innerHTML = '';

  if (connHits.length) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.style.marginBottom = '8px';
    lbl.textContent = 'Связи';
    res.appendChild(lbl);
    connHits.forEach(c => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer;';
      row.innerHTML = '<div class="avatar ' + c.color + '" style="width:36px;height:36px;font-size:13px;">' + initials(c.name) + '</div>'
        + '<div><div style="font-weight:500;font-size:14px;">' + c.name + '</div>'
        + '<div style="font-size:12px;color:var(--ink-3);">' + (c.statusLabel || ROLES[c.role]) + '</div></div>';
      row.addEventListener('click', () => { closeModal(); openConnection(c.id); });
      res.appendChild(row);
    });
  }

  if (entryHits.length) {
    const lbl2 = document.createElement('div');
    lbl2.className = 'section-label';
    lbl2.style.cssText = 'margin:14px 0 8px;';
    lbl2.textContent = 'Записи';
    res.appendChild(lbl2);
    entryHits.forEach(e => {
      const d = fmtDate(e.date);
      const row = document.createElement('div');
      row.style.cssText = 'padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer;';
      row.innerHTML = '<div style="font-size:11px;color:var(--ink-3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.08em;">' + d.day + ' ' + d.month + '</div>'
        + '<div style="font-size:13px;color:var(--ink-2);line-height:1.4;">' + (e.text.length > 80 ? e.text.slice(0,80) + '…' : e.text) + '</div>';
      row.addEventListener('click', () => { closeModal(); openEntry(e.id); });
      res.appendChild(row);
    });
  }

  if (!connHits.length && !entryHits.length) {
    res.innerHTML = '<p style="color:var(--ink-4);font-size:13px;text-align:center;padding:20px 0;">Ничего не найдено</p>';
  }
}

// ============== HELPERS ==============
function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).slice(0,2).join('').toUpperCase();
}
function fmtDate(iso) {
  const d = new Date(iso);
  return { day: d.getDate(), month: MONTHS_SHORT[d.getMonth()], monthFull: MONTHS_RU[d.getMonth()], year: d.getFullYear() };
}
function daysAgo(iso) {
  const diff = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (diff === 0) return 'сегодня';
  if (diff === 1) return 'вчера';
  if (diff < 7) return diff + ' дн. назад';
  if (diff < 30) return Math.floor(diff/7) + ' нед. назад';
  return Math.floor(diff/30) + ' мес. назад';
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function el(html) {
  const d = document.createElement('div');
  d.innerHTML = html.trim();
  return d.firstChild;
}
function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return few;
  return many;
}
function greeting() {
  const h = new Date().getHours();
  if (h < 6) return 'Доброй ночи';
  if (h < 12) return 'Доброе утро';
  if (h < 18) return 'Добрый день';
  return 'Добрый вечер';
}
function lastEntryDate(connId) {
  const entries = state.entries.filter(e => e.tags.includes(connId));
  if (!entries.length) return null;
  return entries.sort((a,b) => b.date.localeCompare(a.date))[0].date;
}
function calcStreak() {
  if (!state.entries.length) return 0;
  const dates = [...new Set(state.entries.map(e => e.date))].sort((a,b) => b.localeCompare(a));
  let streak = 0, prev = null;
  const today = new Date().toISOString().slice(0,10);
  for (const d of dates) {
    if (!prev) {
      if (d === today || daysAgo(d) === 'вчера') { streak = 1; prev = d; continue; }
      else break;
    }
    const diff = Math.floor((new Date(prev) - new Date(d)) / 86400000);
    if (diff === 1) { streak++; prev = d; }
    else break;
  }
  return streak;
}


// ============== HEALTH SCORE ==============
// Возвращает { score: 0-100, label, cls, color, breakdown }

// ============== HEALTH SCORE ==============
function calcHealthScore(connId, role) {
  const now = Date.now(), DAY = 86400000;
  const freq = { partner:3,family:7,friend:14,buddy:30,colleague:21,ex:60 }[role] || 21;
  const entries = state.entries.filter(e=>e.tags.includes(connId))
    .map(e=>({d:Math.floor((now-new Date(e.date))/DAY)})).filter(e=>e.d<=90);
  const ws = entries.reduce((s,e)=>s+Math.exp(-e.d/30),0);
  const ews = Array.from({length:Math.round(90/freq)},(_,i)=>Math.exp(-(i+.5)*freq/30)).reduce((a,b)=>a+b,0)||.01;
  let score = Math.min(100,Math.round(ws/ews*100));
  const last = state.entries.filter(e=>e.tags.includes(connId)).map(e=>e.date).sort((a,b)=>b.localeCompare(a))[0];
  const dsl = last ? Math.floor((now-new Date(last))/DAY) : 999;
  if (dsl>freq*2) score=Math.max(0,score-Math.min(40,Math.floor((dsl-freq*2)/freq)*15));
  const weeks=new Set(entries.map(e=>Math.floor(e.d/7)));
  if(weeks.size>=4) score=Math.min(100,score+8);
  if(score>=80) return {score,label:'Отлично',cls:'great',color:'#10b981',dsl,freq};
  if(score>=55) return {score,label:'Хорошо', cls:'good', color:'#f59e0b',dsl,freq};
  return       {score,label:'Слабеет',cls:'weak', color:'#f97316',dsl,freq};
}

function healthRingSVG(score,color,size=44) {
  const r=(size/2)-4,circ=2*Math.PI*r,offset=circ-(score/100)*circ,cx=size/2,cy=size/2;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><circle class="health-ring-track" cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke-width="3.5"/><circle class="health-ring-fill" cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="3.5" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'"/></svg>';
}

// Anniversaries
function getAnniversaries() {
  const today = new Date();
  const results = [];
  state.connections.forEach(c => {
    if (!c.anniversary) return;
    const a = new Date(c.anniversary);
    const thisYear = new Date(today.getFullYear(), a.getMonth(), a.getDate());
    const diff = Math.round((thisYear - today) / 86400000);
    const years = today.getFullYear() - a.getFullYear();
    if (diff >= 0 && diff <= 30) {
      results.push({ conn: c, diff, years: diff===0?years:years, date: thisYear, label: c.anniversaryLabel||'Знакомство' });
    }
  });
  return results.sort((a,b)=>a.diff-b.diff);
}

function calcAge(birthdate) {
  if (!birthdate) return null;
  const b = new Date(birthdate);
  const t = new Date();
  let age = t.getFullYear() - b.getFullYear();
  if (t.getMonth() < b.getMonth() || (t.getMonth() === b.getMonth() && t.getDate() < b.getDate())) age--;
  return age >= 0 ? age : null;
}

function resizePhoto(file, cb) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 320;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
      else        { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(c.toDataURL('image/jpeg', 0.78));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
